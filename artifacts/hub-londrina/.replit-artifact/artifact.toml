kind = "web"
previewPath = "/"
title = "Hub Londrina — Negócio Local"
version = "1.0.0"
id = "artifacts/hub-londrina"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22662

[services.development]
run = "pnpm --filter @workspace/hub-londrina run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hub-londrina", "run", "build" ]

[services.production.run]
args = [ "node", "artifacts/hub-londrina/server.mjs" ]

[services.production.run.env]
PORT = "22662"
NODE_ENV = "production"
API_INTERNAL_URL = "http://localhost:8080"

[services.env]
PORT = "22662"
BASE_PATH = "/"
